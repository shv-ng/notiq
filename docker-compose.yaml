services:
  app:
    build: .
    ports:
      - "8000:8000"
    command: bash -c "uv run alembic upgrade head && uv run fastapi dev --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    develop:
      watch:
        - path: pyproject.toml
          action: rebuild
        - path: uv.lock
          action: rebuild
        - path: Dockerfile
          action: rebuild

        - path: .
          target: /app
          action: sync
          ignore:
            - __pycache__/
            - .git
            - .venv
  celery:
    build: .
    command: uv run celery -A app.core worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - notiq_postgres_data:/var/lib/postgresql/data

volumes:
  notiq_postgres_data:
  redis_data:
